    <script>
        // Your Projects Data - Edit this section with your real projects
        const projectsData = {
            ai: [
                {
                    title: "Multi-Agent Retail Inventory Assistant",

                    icon: "bi bi-robot",

                    detailLink: "#",
                    github: "#",
                    demo: "#"

                    domain: "Enterprise",
                    description: "Multi-modal RAG chatbot with conversation history and citation support.",
                    icon: "bi bi-file-earmark-text",
                    techs: ["Python", "OpenAI", "Pinecone", "FastAPI"],
                    detailLink: "#",
                    github: "#",
                    demo: "#"
                }
            ],
            modeling: [
                {
                    title: "Demand Forecasting Platform",
                    domain: "Supply Chain",
                    description: "Hybrid Prophet + LSTM model for accurate retail demand prediction.",
                    icon: "bi bi-graph-up",
                    techs: ["Python", "Prophet", "TensorFlow", "Pandas"],
                    detailLink: "#",
                    github: "#",
                    demo: "#"
                }
            ],
            analytics: [
                {
                    title: "Customer Analytics Dashboard",
                    domain: "Marketing",
                    description: "360° customer view with segmentation and lifetime value prediction.",
                    icon: "bi-pie-chart",
                    techs: ["Power BI", "SQL", "Python", "Tableau"],
                    detailLink: "#",
                    github: "#",
                    demo: "#"
                }
            ],
            automation: [
                {
                    title: "Enterprise Data Pipeline",
                    domain: "Data Infrastructure",
                    description: "Automated ETL pipeline with Airflow, dbt and real-time monitoring.",
                    icon: "bi bi-arrow-repeat",
                    techs: ["Airflow", "dbt", "AWS", "Python"],
                    detailLink: "#",
                    github: "#",
                    demo: "#"
                }
            ]
        };

        function createProjectCard(project) {
            return `
                <div class="col-lg-6 col-xl-4">
                    <div class="card project-card border-0 shadow-sm rounded-4 overflow-hidden h-100">
                        <!-- Thumbnail -->
                        <div class="project-thumb">
                            <i class="${project.icon}"></i>
                        </div>
                        
                        <div class="card-body p-4 d-flex flex-column">
                            <div class="d-flex justify-content-between align-items-start mb-3">
                                <h5 class="card-title mb-0">${project.title}</h5>
                                <span class="badge rounded-pill bg-light text-dark border">${project.domain}</span>
                            </div>
                            
                            <p class="text-muted small mb-3 flex-grow-1">
                                ${project.description}
                            </p>
                            
                            <!-- Tech Tags -->
                            <div class="d-flex flex-wrap gap-2 mb-4">
                                ${project.techs.map(tech => `
                                    <span class="badge badge-tech rounded-pill px-3 py-2">${tech}</span>
                                `).join('')}
                            </div>
                            
                            <!-- Action Buttons -->
                            <div class="d-flex gap-2 mt-auto">
                                <a href="${project.detailLink}" class="btn btn-primary btn-sm flex-grow-1">
                                    View Details
                                </a>
                                ${project.github ? `
                                <a href="${project.github}" class="btn btn-outline-secondary btn-sm" title="GitHub">
                                    <i class="bi bi-github"></i>
                                </a>` : ''}
                                ${project.demo ? `
                                <a href="${project.demo}" class="btn btn-outline-secondary btn-sm" title="Live Demo">
                                    <i class="bi bi-link-45deg"></i>
                                </a>` : ''}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderProjects() {
            // AI & LLM
            document.getElementById('ai-projects').innerHTML = projectsData.ai.map(createProjectCard).join('');
            
            // Modeling
            document.getElementById('modeling-projects').innerHTML = projectsData.modeling.map(createProjectCard).join('');
            
            // Analytics
            document.getElementById('analytics-projects').innerHTML = projectsData.analytics.map(createProjectCard).join('');
            
            // Automation
            document.getElementById('automation-projects').innerHTML = projectsData.automation.map(createProjectCard).join('');
        }

        // Initialize when page loads
        window.onload = function() {
            renderProjects();
        };
    </script>
